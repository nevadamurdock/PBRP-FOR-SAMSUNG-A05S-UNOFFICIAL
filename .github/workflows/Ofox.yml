name: Recovery Builder - OrangeFox Recovery Project

on:
  workflow_dispatch:
    inputs:
      DEVICE_TREE:
        description: 'Custom Recovery Tree'
        required: true
        default: 'https://github.com/nevadamurdock/android_device_samsung_a05s.git'
      DEVICE_TREE_BRANCH:
        description: 'Custom Recovery Tree Branch'
        required: true
        default: 'android-12.1'
      DEVICE_PATH:
        description: 'Specify your Device Path'
        required: true
        default: 'device/samsung/a05s'
      DEVICE_NAME:
        description: 'Specify your Device Codename'
        required: true
        default: 'a05s'
      MAINTAINER_NAME:
        description: 'Input Maintainer Name'
        required: true
        default: 'Agus Ganteng'

jobs:
  build:
    name: Build OrangeFox oleh ${{ github.event.inputs.MAINTAINER_NAME }}
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Tampilkan Informasi Awal Build
      run: |
        echo "=== MENJALANKAN PROSES BUILD ORANGEFOX ==="
        echo "Target Perangkat : ${{ github.event.inputs.DEVICE_NAME }}"
        echo "Device Tree      : ${{ github.event.inputs.DEVICE_TREE }} [${{ github.event.inputs.DEVICE_TREE_BRANCH }}]"
        echo "Maintainer Utama : ${{ github.event.inputs.MAINTAINER_NAME }}"
        echo "Waktu Mulai      : $(date)"

    - name: Pembersihan Disk Maksimal (Anti Disk Full Ekstrem)
      run: |
        echo "=== UKURAN DISK SEBELUM PEMBERSIHAN ==="
        df -h
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf /usr/local/share/phantomjs*
        sudo rm -rf /usr/share/swift
        sudo rm -rf /var/lib/megam_actions
        sudo apt-get clean
        docker rmi $(docker images -q) 2>/dev/null || true
        echo "=== UKURAN DISK SESUDAH PEMBERSIHAN ==="
        df -h
      
    - name: Alokasi Swap RAM Ekstra 16GB (Anti OOM Crash)
      run: |
        sudo swapoff -a
        sudo rm -f /mnt/swapfile
        sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=16384
        sudo chmod 600 /mnt/swapfile
        sudo mkswap /mnt/swapfile
        sudo swapon /mnt/swapfile
        echo "=== STATUS MEMORI VIRTUAL (SWAP) AKTIF ==="
        free -h
        
    - name: Pasang Seluruh Dependensi Kompilasi Android
      run: |
        sudo apt update
        sudo apt -y install gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib libc6-dev lib32ncurses5-dev x11proto-core-dev libx11-dev tree lib32z-dev libgl1-mesa-dev libxml2-utils xsltproc bc ccache lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libxml2 lzop pngcrush schedtool squashfs-tools imagemagick libbz2-dev lzma ncftp qemu-user-static libstdc++-10-dev libtinfo5 libgflags-dev python3 python3-pip
        sudo add-apt-repository universe
        sudo apt -y install libncurses5

    - name: Pasang OpenJDK Bawaan
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '8'

    - name: Konfigurasi Utilitas Git Repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Unduh dan Persiapkan Skrip Sinkronisasi OrangeFox
      run: |
        mkdir -p fox_build
        cd fox_build
        
        # Mengunduh arsip yang telah Anda siapkan
        wget https://uploader.sh/Li_zF/7zI1U.gz
        
        # Ekstrak file .gz bawaan dari GitLab sync
        gunzip 7zI1U.gz
        
        # Antisipasi apabila isi file mentahnya adalah sebuah tarball
        if file 7zI1U | grep -q 'tar archive'; then
          tar -xvf 7zI1U
        else
          # Jika berupa skrip teks langsung, ubah namanya agar seragam
          mv 7zI1U orangefox_sync.sh 2>/dev/null || true
        fi
        
        # Berikan izin eksekusi penuh pada skrip
        chmod +x *.sh 2>/dev/null || chmod +x orangefox_sync.sh 2>/dev/null

    - name: Jalankan Sinkronisasi Kode Sumber OrangeFox
      run: |
        cd fox_build
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        
        # Mengeksekusi skrip bawaan dari repositori OrangeFox Sync
        if [ -f "orangefox_sync.sh" ]; then
          ./orangefox_sync.sh
        else
          sh *.sh
        fi

    - name: Mengkloning Device Tree Samsung A05s
      run: |
        cd fox_build
        # Memasukkan device tree ke dalam struktur folder hasil sinkronisasi skrip
        git clone ${{ github.event.inputs.DEVICE_TREE }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./${{ github.event.inputs.DEVICE_PATH }}
        cd ${{ github.event.inputs.DEVICE_PATH }}
        echo "COMMIT_ID=$(git rev-parse HEAD | cut -c1-7)" >> $GITHUB_ENV

    - name: Verifikasi Struktur Nama Makefile Target
      run: |
        cd fox_build
        if [ -f ${{ github.event.inputs.DEVICE_PATH }}/twrp_${{ github.event.inputs.DEVICE_NAME }}.mk ]; then
            echo "DEVICE_MAKEFILE=twrp_${{ github.event.inputs.DEVICE_NAME }}" >> $GITHUB_ENV
        elif [ -f ${{ github.event.inputs.DEVICE_PATH }}/omni_${{ github.event.inputs.DEVICE_NAME }}.mk ]; then
            echo "DEVICE_MAKEFILE=omni_${{ github.event.inputs.DEVICE_NAME }}" >> $GITHUB_ENV
        else
          echo "Format Makefile perangkat tidak ditemukan di device tree!"
          exit 1
        fi

    - name: Proses Eksekusi Kompilasi OrangeFox Recovery
      run: |
        cd fox_build
        source build/envsetup.sh
        
        export ALLOW_MISSING_DEPENDENCIES=true
        export _JAVA_OPTIONS="-Xmx4g"
        export LC_ALL="C"
        
        # Flag parameter identitas kompilasi OrangeFox
        export FOX_BUILD_DEVICE=${{ github.event.inputs.DEVICE_NAME }}
        export OF_MAINTAINER="${{ github.event.inputs.MAINTAINER_NAME }}"
        
        lunch ${{ env.DEVICE_MAKEFILE }}-eng
        make clean
        make recoveryimage -j2
        echo "Proses pembuatan biner gambar utama selesai."
      
    - name: Definisikan Tanggal Selesai Build
      run: |
        echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV
      
    - name: Publikasikan Hasil Ekstraksi ke GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          fox_build/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/OrangeFox*.zip
          fox_build/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/recovery.img
        name: Unofficial OrangeFox untuk ${{ github.event.inputs.DEVICE_NAME }} // ${{ env.BUILD_DATE }}
        tag_name: Fox-${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }}
        body: |
          ### Kompilasi Pembuatan Sukses Berjalan!
          - **Perangkat**: Samsung Galaxy A05s (`${{ github.event.inputs.DEVICE_NAME }}`)
          - **Maintainer**: `${{ github.event.inputs.MAINTAINER_NAME }}`
          - **Device Tree**: [Sumber Terkait](${{ github.event.inputs.DEVICE_TREE }}/tree/${{ github.event.inputs.DEVICE_TREE_BRANCH }})
          - **ID Komit Tree**: `${{ env.COMMIT_ID }}`
